name: Java CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - '.github/workflows/java-ci.yml'

  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - '.github/workflows/java-ci.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: java-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  AVRO_TEST_ROOT: lang/java/avro/src/test/java/org/apache/avro

jobs:
  manual-and-llm-tests:
    name: Manual and LLM Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Disable C1-C4 test variants
        run: |
          set -euo pipefail

          DISABLED_DIR=".ci-disabled/c-variant-tests"
          mkdir -p "$DISABLED_DIR"

          for d in \
            "$AVRO_TEST_ROOT/randoop/schemac1" \
            "$AVRO_TEST_ROOT/randoop/schemac2" \
            "$AVRO_TEST_ROOT/randoop/schemac3" \
            "$AVRO_TEST_ROOT/randoop/schemac4" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc1" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc2" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc3" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc4"
          do
            if [ -e "$d" ]; then
              mkdir -p "$DISABLED_DIR/$(dirname "$d")"
              mv "$d" "$DISABLED_DIR/$d"
            fi
          done

          find "$AVRO_TEST_ROOT" -type f \( \
            -name '*C1*.java' -o \
            -name '*C2*.java' -o \
            -name '*C3*.java' -o \
            -name '*C4*.java' \
          \) -print0 | while IFS= read -r -d '' f; do
            mkdir -p "$DISABLED_DIR/$(dirname "$f")"
            mv "$f" "$DISABLED_DIR/$f"
          done

          echo "Disabled C-variant files:"
          find "$DISABLED_DIR" -type f -name '*.java' | sort || true

      - name: List Manual and LLM test sources
        run: |
          find "$AVRO_TEST_ROOT" \
            -type f -name '*.java' \
            ! -path '*/randoop/*' \
            ! -name '*_ESTest.java' \
            ! -name '*_ESTest_scaffolding.java' \
            | sort

      - name: Run Manual and LLM Tests
        run: |
          mvn -U -B -pl lang/java/avro \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            '-Dsurefire.includes=**/org/apache/avro/**/*.java' \
            '-Dsurefire.excludes=**/org/apache/avro/randoop/**,**/*Randoop*.java,**/*_ESTest.java,**/*_ESTest_scaffolding.java,**/*C1*.java,**/*C2*.java,**/*C3*.java,**/*C4*.java' \
            clean test jacoco:report

      - name: Upload Manual and LLM Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-manual-and-llm-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore

  evosuite-tests:
    name: Evosuite Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Disable C1-C4 test variants
        run: |
          set -euo pipefail

          DISABLED_DIR=".ci-disabled/c-variant-tests"
          mkdir -p "$DISABLED_DIR"

          for d in \
            "$AVRO_TEST_ROOT/randoop/schemac1" \
            "$AVRO_TEST_ROOT/randoop/schemac2" \
            "$AVRO_TEST_ROOT/randoop/schemac3" \
            "$AVRO_TEST_ROOT/randoop/schemac4" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc1" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc2" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc3" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc4"
          do
            if [ -e "$d" ]; then
              mkdir -p "$DISABLED_DIR/$(dirname "$d")"
              mv "$d" "$DISABLED_DIR/$d"
            fi
          done

          find "$AVRO_TEST_ROOT" -type f \( \
            -name '*C1*.java' -o \
            -name '*C2*.java' -o \
            -name '*C3*.java' -o \
            -name '*C4*.java' \
          \) -print0 | while IFS= read -r -d '' f; do
            mkdir -p "$DISABLED_DIR/$(dirname "$f")"
            mv "$f" "$DISABLED_DIR/$f"
          done

          echo "Disabled C-variant files:"
          find "$DISABLED_DIR" -type f -name '*.java' | sort || true

      - name: Normalize Evosuite runtime configuration
        run: |
          set -euo pipefail

          for f in \
            "$AVRO_TEST_ROOT/Schema_ESTest.java" \
            "$AVRO_TEST_ROOT/file/DataFileWriter_ESTest.java"
          do
            if [ -f "$f" ]; then
              perl -0pi -e 's/separateClassLoader\s*=\s*false/separateClassLoader = true/g; s/useVFS\s*=\s*false/useVFS = true/g; s/useVNET\s*=\s*false/useVNET = true/g' "$f"
              grep -n "EvoRunnerParameters" "$f"
            fi
          done

          for f in \
            "$AVRO_TEST_ROOT/Schema_ESTest_scaffolding.java" \
            "$AVRO_TEST_ROOT/file/DataFileWriter_ESTest_scaffolding.java"
          do
            if [ -f "$f" ]; then
              perl -0pi -e 's/RuntimeSettings\.useVFS\s*=\s*false/RuntimeSettings.useVFS = true/g; s/RuntimeSettings\.useVNET\s*=\s*false/RuntimeSettings.useVNET = true/g' "$f"
            fi
          done

      - name: List Evosuite test sources
        run: |
          find "$AVRO_TEST_ROOT" \
            -type f \( \
              -name 'Schema_ESTest.java' -o \
              -name 'Schema_ESTest_scaffolding.java' -o \
              -name 'DataFileWriter_ESTest.java' -o \
              -name 'DataFileWriter_ESTest_scaffolding.java' \
            \) \
            | sort

      - name: Run Evosuite Tests
        run: |
          mvn -U -B -pl lang/java/avro -Pevosuite-only \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            -Dmaven.compiler.testRelease=17 \
            '-Dtest=Schema_ESTest,DataFileWriter_ESTest' \
            clean test jacoco:report

      - name: Upload Evosuite Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-evosuite-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore

  randoop-tests:
    name: Randoop Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Disable C1-C4 test variants
        run: |
          set -euo pipefail

          DISABLED_DIR=".ci-disabled/c-variant-tests"
          mkdir -p "$DISABLED_DIR"

          for d in \
            "$AVRO_TEST_ROOT/randoop/schemac1" \
            "$AVRO_TEST_ROOT/randoop/schemac2" \
            "$AVRO_TEST_ROOT/randoop/schemac3" \
            "$AVRO_TEST_ROOT/randoop/schemac4" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc1" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc2" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc3" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc4"
          do
            if [ -e "$d" ]; then
              mkdir -p "$DISABLED_DIR/$(dirname "$d")"
              mv "$d" "$DISABLED_DIR/$d"
            fi
          done

          find "$AVRO_TEST_ROOT" -type f \( \
            -name '*C1*.java' -o \
            -name '*C2*.java' -o \
            -name '*C3*.java' -o \
            -name '*C4*.java' \
          \) -print0 | while IFS= read -r -d '' f; do
            mkdir -p "$DISABLED_DIR/$(dirname "$f")"
            mv "$f" "$DISABLED_DIR/$f"
          done

          echo "Disabled C-variant files:"
          find "$DISABLED_DIR" -type f -name '*.java' | sort || true

      - name: List Randoop test sources
        run: |
          find "$AVRO_TEST_ROOT/randoop/schema" "$AVRO_TEST_ROOT/randoop/datafilewriter" \
            -type f -name '*.java' \
            | sort

      - name: Run Randoop Tests
        run: |
          mvn -U -B -pl lang/java/avro -Prandoop-only \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            '-Dsurefire.includes=**/org/apache/avro/randoop/schema/**/*.java,**/org/apache/avro/randoop/datafilewriter/**/*.java' \
            '-Dsurefire.excludes=**/*ErrorTest*.java,**/*_ESTest.java,**/*_ESTest_scaffolding.java,**/*C1*.java,**/*C2*.java,**/*C3*.java,**/*C4*.java,**/schemac1/**,**/schemac2/**,**/schemac3/**,**/schemac4/**,**/datafilewriterc1/**,**/datafilewriterc2/**,**/datafilewriterc3/**,**/datafilewriterc4/**' \
            clean test jacoco:report

      - name: Upload Randoop Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-randoop-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore
