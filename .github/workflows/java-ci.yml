name: Java CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - '.github/workflows/java-ci.yml'

  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - '.github/workflows/java-ci.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: java-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  avro-core-tests:
    name: Avro Java core - selected JUnit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Check selected test exists
        run: |
          ls -l lang/java/avro/src/test/java/org/apache/avro/TestSchema.java
          grep -n "class TestSchema" lang/java/avro/src/test/java/org/apache/avro/TestSchema.java

      - name: Run all tests in org.apache.avro folder
        run: |
          mvn -B -pl lang/java/avro \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Dsurefire.includes=**/org/apache/avro/*.java \
            clean test jacoco:report
