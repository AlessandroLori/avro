name: Java CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - '.github/workflows/java-ci.yml'

  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - '.github/workflows/java-ci.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: java-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  manual-tests:
    name: Manual/JUnit tests under org.apache.avro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: List manual test sources selected by this job
        run: |
          find lang/java/avro/src/test/java/org/apache/avro \
            -type f -name '*.java' \
            ! -path '*/randoop/*' \
            ! -name '*_ESTest.java' \
            ! -name '*_ESTest_scaffolding.java' \
            | sort

      - name: Run all non-generated tests under org.apache.avro
        run: |
          mvn -U -B -pl lang/java/avro \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            '-Dsurefire.includes=**/org/apache/avro/**/*.java' \
            clean test jacoco:report

      - name: Upload manual Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-manual-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore

  evosuite-tests:
    name: EvoSuite generated tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: List EvoSuite test sources selected by this job
        run: |
          find lang/java/avro/src/test/java/org/apache/avro \
            -type f \( -name '*_ESTest.java' -o -name '*_ESTest_scaffolding.java' \) \
            | sort

      - name: Run EvoSuite tests only
        run: |
          mvn -U -B -pl lang/java/avro -Pevosuite-only \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            clean test jacoco:report

      - name: Upload EvoSuite Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-evosuite-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore

  randoop-tests:
    name: Randoop generated regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: List Randoop regression test sources selected by this job
        run: |
          find lang/java/avro/src/test/java/org/apache/avro/randoop \
            -type f -name '*.java' \
            | sort

      - name: Run Randoop regression tests only
        run: |
          mvn -U -B -pl lang/java/avro -Prandoop-only \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            clean test jacoco:report

      - name: Upload Randoop Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-randoop-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore
