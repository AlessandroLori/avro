name: Java CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - 'tools/evosuite/**'
      - '.github/workflows/java-ci.yml'

  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'lang/java/avro/**'
      - 'lang/java/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - 'tools/evosuite/**'
      - '.github/workflows/java-ci.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: java-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  AVRO_TEST_ROOT: lang/java/avro/src/test/java/org/apache/avro
  AVRO_MODULE: lang/java/avro

jobs:
  manual-and-llm-tests:
    name: Manual and LLM Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Disable C1-C4 test variants
        run: |
          set -euo pipefail

          DISABLED_DIR=".ci-disabled/c-variant-tests"
          mkdir -p "$DISABLED_DIR"

          for d in \
            "$AVRO_TEST_ROOT/randoop/schemac1" \
            "$AVRO_TEST_ROOT/randoop/schemac2" \
            "$AVRO_TEST_ROOT/randoop/schemac3" \
            "$AVRO_TEST_ROOT/randoop/schemac4" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc1" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc2" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc3" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc4"
          do
            if [ -e "$d" ]; then
              mkdir -p "$DISABLED_DIR/$(dirname "$d")"
              mv "$d" "$DISABLED_DIR/$d"
            fi
          done

          find "$AVRO_TEST_ROOT" -type f \( \
            -name '*C1*.java' -o \
            -name '*C2*.java' -o \
            -name '*C3*.java' -o \
            -name '*C4*.java' \
          \) -print0 | while IFS= read -r -d '' f; do
            mkdir -p "$DISABLED_DIR/$(dirname "$f")"
            mv "$f" "$DISABLED_DIR/$f"
          done

          echo "Disabled C-variant files:"
          find "$DISABLED_DIR" -type f -name '*.java' | sort || true

      - name: List Manual and LLM test sources
        run: |
          find "$AVRO_TEST_ROOT" \
            -type f -name '*.java' \
            ! -path '*/randoop/*' \
            ! -name '*_ESTest.java' \
            ! -name '*_ESTest_scaffolding.java' \
            | sort

      - name: Run Manual and LLM Tests
        run: |
          mvn -U -B -pl "$AVRO_MODULE" \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            '-Dsurefire.includes=**/org/apache/avro/**/*.java' \
            '-Dsurefire.excludes=**/org/apache/avro/randoop/**,**/*Randoop*.java,**/*_ESTest.java,**/*_ESTest_scaffolding.java,**/*C1*.java,**/*C2*.java,**/*C3*.java,**/*C4*.java' \
            clean test jacoco:report

      - name: Upload Manual and LLM Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-manual-and-llm-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore

  evosuite-tests:
    name: Evosuite Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Install EvoSuite runtime 1.2.0
        run: |
          set -euo pipefail

          EVO_RUNTIME="tools/evosuite/evosuite-standalone-runtime-1.2.0.jar"

          if [ ! -f "$EVO_RUNTIME" ]; then
            echo "Missing $EVO_RUNTIME"
            echo "Commit this file: tools/evosuite/evosuite-standalone-runtime-1.2.0.jar"
            exit 1
          fi

          cat > /tmp/evosuite-standalone-runtime-1.2.0.pom <<'EOF'
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>org.evosuite</groupId>
            <artifactId>evosuite-standalone-runtime</artifactId>
            <version>1.2.0</version>
            <packaging>jar</packaging>
          </project>
          EOF

          mvn -B org.apache.maven.plugins:maven-install-plugin:3.1.3:install-file \
            -Dfile="$EVO_RUNTIME" \
            -DpomFile=/tmp/evosuite-standalone-runtime-1.2.0.pom

      - name: Disable C1-C4 test variants
        run: |
          set -euo pipefail

          DISABLED_DIR=".ci-disabled/c-variant-tests"
          mkdir -p "$DISABLED_DIR"

          for d in \
            "$AVRO_TEST_ROOT/randoop/schemac1" \
            "$AVRO_TEST_ROOT/randoop/schemac2" \
            "$AVRO_TEST_ROOT/randoop/schemac3" \
            "$AVRO_TEST_ROOT/randoop/schemac4" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc1" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc2" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc3" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc4"
          do
            if [ -e "$d" ]; then
              mkdir -p "$DISABLED_DIR/$(dirname "$d")"
              mv "$d" "$DISABLED_DIR/$d"
            fi
          done

          find "$AVRO_TEST_ROOT" -type f \( \
            -name '*C1*.java' -o \
            -name '*C2*.java' -o \
            -name '*C3*.java' -o \
            -name '*C4*.java' \
          \) -print0 | while IFS= read -r -d '' f; do
            mkdir -p "$DISABLED_DIR/$(dirname "$f")"
            mv "$f" "$DISABLED_DIR/$f"
          done

          echo "Disabled C-variant files:"
          find "$DISABLED_DIR" -type f -name '*.java' | sort || true

      - name: Disable other EvoSuite tests
        run: |
          set -euo pipefail

          KEEP_1="$AVRO_TEST_ROOT/Schema_ESTest.java"
          KEEP_2="$AVRO_TEST_ROOT/Schema_ESTest_scaffolding.java"
          KEEP_3="$AVRO_TEST_ROOT/file/DataFileWriter_ESTest.java"
          KEEP_4="$AVRO_TEST_ROOT/file/DataFileWriter_ESTest_scaffolding.java"

          DISABLED_DIR=".ci-disabled/other-evosuite-tests"
          mkdir -p "$DISABLED_DIR"

          find "$AVRO_TEST_ROOT" -type f \( \
            -name '*_ESTest.java' -o \
            -name '*_ESTest_scaffolding.java' \
          \) -print0 | while IFS= read -r -d '' f; do
            case "$f" in
              "$KEEP_1"|"$KEEP_2"|"$KEEP_3"|"$KEEP_4")
                echo "KEEP $f"
                ;;
              *)
                mkdir -p "$DISABLED_DIR/$(dirname "$f")"
                echo "DISABLE $f"
                mv "$f" "$DISABLED_DIR/$f"
                ;;
            esac
          done

      - name: Normalize EvoSuite runtime configuration
        run: |
          set -euo pipefail

          for f in \
            "$AVRO_TEST_ROOT/Schema_ESTest.java" \
            "$AVRO_TEST_ROOT/file/DataFileWriter_ESTest.java"
          do
            if [ -f "$f" ]; then
              perl -0pi -e 's/separateClassLoader\s*=\s*false/separateClassLoader = true/g; s/separateClassLoader\s*=\s*true/separateClassLoader = true/g; s/useVFS\s*=\s*false/useVFS = true/g; s/useVNET\s*=\s*false/useVNET = true/g' "$f"
              grep -n "EvoRunnerParameters" "$f"
            fi
          done

          for f in \
            "$AVRO_TEST_ROOT/Schema_ESTest_scaffolding.java" \
            "$AVRO_TEST_ROOT/file/DataFileWriter_ESTest_scaffolding.java"
          do
            if [ -f "$f" ]; then
              perl -0pi -e 's/RuntimeSettings\.useVFS\s*=\s*false/RuntimeSettings.useVFS = true/g; s/RuntimeSettings\.useVNET\s*=\s*false/RuntimeSettings.useVNET = true/g' "$f"
            fi
          done

      - name: Disable Windows-specific EvoSuite Schema file tests
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path

          path = Path("lang/java/avro/src/test/java/org/apache/avro/Schema_ESTest.java")
          text = path.read_text(encoding="utf-8")

          for method in ("test094", "test150"):
              marker = f"public void {method}("
              idx = text.find(marker)
              if idx == -1:
                  raise SystemExit(f"Cannot find {method} in {path}")

              previous = text[max(0, idx - 400):idx]
              if "@org.junit.Ignore" not in previous:
                  text = text[:idx] + (
                      '@org.junit.Ignore("Windows-specific generated EvoSuite file-path test")\n'
                      '  '
                  ) + text[idx:]

          path.write_text(text, encoding="utf-8")
          PY

          grep -n -A3 -B3 "test094\|test150" "$AVRO_TEST_ROOT/Schema_ESTest.java"

      - name: List EvoSuite test sources
        run: |
          find "$AVRO_TEST_ROOT" \
            -type f \( \
              -name 'Schema_ESTest.java' -o \
              -name 'Schema_ESTest_scaffolding.java' -o \
              -name 'DataFileWriter_ESTest.java' -o \
              -name 'DataFileWriter_ESTest_scaffolding.java' \
            \) \
            | sort

      - name: Resolve JDK 17 test JVM paths
        run: |
          set -euo pipefail

          RAW_JAVA_HOME_17="${JAVA_HOME_17_X64:-${JAVA_HOME_17_ARM64:-}}"

          if [ -z "$RAW_JAVA_HOME_17" ]; then
            echo "Could not find JAVA_HOME_17_X64 or JAVA_HOME_17_ARM64"
            env | sort | grep '^JAVA_HOME' || true
            exit 1
          fi

          if command -v cygpath >/dev/null 2>&1; then
            TEST_JAVA_CMD="$(cygpath -u "$RAW_JAVA_HOME_17")/bin/java"
            TEST_JAVA_MAVEN="$(cygpath -w "$RAW_JAVA_HOME_17")\\bin\\java.exe"
            JACOCO_DEST="$(cygpath -w "$PWD/$AVRO_MODULE/target/jacoco.exec")"
          else
            TEST_JAVA_CMD="$RAW_JAVA_HOME_17/bin/java"
            TEST_JAVA_MAVEN="$RAW_JAVA_HOME_17/bin/java"
            JACOCO_DEST="$PWD/$AVRO_MODULE/target/jacoco.exec"
          fi

          echo "TEST_JAVA_CMD=$TEST_JAVA_CMD" >> "$GITHUB_ENV"
          echo "TEST_JAVA_MAVEN=$TEST_JAVA_MAVEN" >> "$GITHUB_ENV"
          echo "JACOCO_DEST=$JACOCO_DEST" >> "$GITHUB_ENV"

          echo "Maven JVM:"
          java -version

          echo "Surefire/EvoSuite JVM:"
          "$TEST_JAVA_CMD" -version

      - name: Run Schema EvoSuite Tests
        run: |
          set -euo pipefail

          rm -f "$AVRO_MODULE/target/jacoco.exec"

          mvn -U -B -pl "$AVRO_MODULE" \
            -Pevosuite-only \
            -Devosuite.version=1.2.0 \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            -Dmaven.compiler.testRelease=17 \
            -Djacoco-agent.destfile="$JACOCO_DEST" \
            -Djvm="$TEST_JAVA_MAVEN" \
            -DsurefireArgLine="-noverify" \
            -Dtest="org.apache.avro.Schema_ESTest" \
            clean test-compile jacoco:instrument surefire:test jacoco:restore-instrumented-classes jacoco:report

      - name: Archive Schema EvoSuite reports
        if: always()
        run: |
          mkdir -p "$AVRO_MODULE/target/ci-surefire-reports/evosuite-schema"
          cp -R "$AVRO_MODULE/target/surefire-reports/." "$AVRO_MODULE/target/ci-surefire-reports/evosuite-schema/" 2>/dev/null || true

      - name: Run DataFileWriter EvoSuite Tests
        run: |
          set -euo pipefail

          rm -f "$AVRO_MODULE/target/jacoco.exec"

          mvn -U -B -pl "$AVRO_MODULE" \
            -Pevosuite-only \
            -Devosuite.version=1.2.0 \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            -Dmaven.compiler.testRelease=17 \
            -Djacoco-agent.destfile="$JACOCO_DEST" \
            -Djvm="$TEST_JAVA_MAVEN" \
            -DsurefireArgLine="-noverify" \
            -Dtest="org.apache.avro.file.DataFileWriter_ESTest" \
            clean test-compile jacoco:instrument surefire:test jacoco:restore-instrumented-classes jacoco:report

      - name: Archive DataFileWriter EvoSuite reports
        if: always()
        run: |
          mkdir -p "$AVRO_MODULE/target/ci-surefire-reports/evosuite-datafilewriter"
          cp -R "$AVRO_MODULE/target/surefire-reports/." "$AVRO_MODULE/target/ci-surefire-reports/evosuite-datafilewriter/" 2>/dev/null || true

      - name: Print EvoSuite report summaries on failure
        if: failure()
        run: |
          find "$AVRO_MODULE/target" -path '*surefire-reports/*.txt' -type f -print -exec sed -n '1,260p' {} \; || true

      - name: Upload EvoSuite Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-evosuite-tests
          path: |
            lang/java/avro/target/surefire-reports/**
            lang/java/avro/target/ci-surefire-reports/**
          if-no-files-found: ignore

  randoop-tests:
    name: Randoop Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11, 17 and 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            17
            21
          cache: maven

      - name: Disable C1-C4 test variants
        run: |
          set -euo pipefail

          DISABLED_DIR=".ci-disabled/c-variant-tests"
          mkdir -p "$DISABLED_DIR"

          for d in \
            "$AVRO_TEST_ROOT/randoop/schemac1" \
            "$AVRO_TEST_ROOT/randoop/schemac2" \
            "$AVRO_TEST_ROOT/randoop/schemac3" \
            "$AVRO_TEST_ROOT/randoop/schemac4" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc1" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc2" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc3" \
            "$AVRO_TEST_ROOT/randoop/datafilewriterc4"
          do
            if [ -e "$d" ]; then
              mkdir -p "$DISABLED_DIR/$(dirname "$d")"
              mv "$d" "$DISABLED_DIR/$d"
            fi
          done

          find "$AVRO_TEST_ROOT" -type f \( \
            -name '*C1*.java' -o \
            -name '*C2*.java' -o \
            -name '*C3*.java' -o \
            -name '*C4*.java' \
          \) -print0 | while IFS= read -r -d '' f; do
            mkdir -p "$DISABLED_DIR/$(dirname "$f")"
            mv "$f" "$DISABLED_DIR/$f"
          done

          echo "Disabled C-variant files:"
          find "$DISABLED_DIR" -type f -name '*.java' | sort || true

      - name: Disable Windows-specific Randoop newline test
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path

          path = Path("lang/java/avro/src/test/java/org/apache/avro/randoop/schema/SchemaRandoopRegressionTest0.java")
          text = path.read_text(encoding="utf-8")

          marker = "public void test62("
          idx = text.find(marker)
          if idx == -1:
              raise SystemExit(f"Cannot find test62 in {path}")

          previous = text[max(0, idx - 400):idx]
          if "@org.junit.Ignore" not in previous:
              text = text[:idx] + (
                  '@org.junit.Ignore("Windows-specific generated newline formatting test")\n'
                  '  '
              ) + text[idx:]

          path.write_text(text, encoding="utf-8")
          PY

          grep -n -A3 -B3 "test62" "$AVRO_TEST_ROOT/randoop/schema/SchemaRandoopRegressionTest0.java"

      - name: List Randoop test sources
        run: |
          find "$AVRO_TEST_ROOT/randoop/schema" "$AVRO_TEST_ROOT/randoop/datafilewriter" \
            -type f -name '*.java' \
            | sort

      - name: Run Randoop Tests
        run: |
          mvn -U -B -pl "$AVRO_MODULE" -Prandoop-only \
            -Dspotless.check.skip=true \
            -Dcheckstyle.skip=true \
            -Drat.skip=true \
            -Dinvoker.skip=true \
            '-Dsurefire.includes=**/org/apache/avro/randoop/schema/**/*.java,**/org/apache/avro/randoop/datafilewriter/**/*.java' \
            '-Dsurefire.excludes=**/*ErrorTest*.java,**/*_ESTest.java,**/*_ESTest_scaffolding.java,**/*C1*.java,**/*C2*.java,**/*C3*.java,**/*C4*.java,**/schemac1/**,**/schemac2/**,**/schemac3/**,**/schemac4/**,**/datafilewriterc1/**,**/datafilewriterc2/**,**/datafilewriterc3/**,**/datafilewriterc4/**' \
            clean test jacoco:report

      - name: Upload Randoop Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-randoop-tests
          path: lang/java/avro/target/surefire-reports/**
          if-no-files-found: ignore
